## Main launch file for the polaris for lab 2

launch:
	- node:
	    pkg: 'ndi_tracker'
	    exec: 'ndi_tracker'
	    name: 'ndi_tracker'
	    output: 'screen'
	    
	    args: '-j /src/lab_2/lab_2/polaris_config/polaris_config.json -P 0.05'


 - node:
		pkg: 'tf2_ros'
		exec: 'static_transform_publisher'
		name: 'base_frame_static_tf'
		args: '-0.030.5 0.0 0.228.0 0.7071 0.0 0.7071 0.0'

- node: 
		pkg: 'tf2_ros'
		exec: 'static_transform_publisher'
		name: 'ee_frame_static_tf'
		args: '-0.02509 0.0 0.0238999 0.7071 0.0 0.0 0.7071'

