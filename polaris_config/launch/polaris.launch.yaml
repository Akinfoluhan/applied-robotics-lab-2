## Main launch file for the polaris for lab 2

launch:
  - node:
      pkg: 'ndi_tracker'
      exec: 'ndi_tracker'
      name: 'ndi_tracker'
      output: 'screen'
      args: '-j /home/akinfoluhan/workspace/ros2_ws/src/lab_2/polaris_config/share/polaris_config.json -P 0.05'

  - node:
      pkg: 'tf2_ros'
      exec: 'static_transform_publisher'
      name: 'base_frame_static_tf'
      args: '--x -0.0305 --y 0.0 --z 0.2255 --qx 0.0 --qy 0.7071 --qz 0.0 --qw 0.7071 --frame-id base_tracker --child-frame-id world'

  - node:
      pkg: 'tf2_ros'
      exec: 'static_transform_publisher'
      name: 'ee_frame_static_tf'
      args: '--x -0.02509 --y 0.0 --z 0.0238999 --qx 0.7071 --qy 0.0 --qz 0.0 --qw 0.7071 --frame-id ee_tracker --child-frame-id ee_measured_frame'
